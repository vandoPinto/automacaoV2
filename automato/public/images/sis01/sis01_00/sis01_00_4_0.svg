pan><tspan x="-433.5" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">expectativas do mercado. Ele deve também integrar </tspan><tspan x="-426.45" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">a educação do profissional corretor de imóveis, de </tspan><tspan x="-415.4" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">forma que o habilite a “fazer a ponte” entre os </tspan><tspan x="-412.05" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">arquitetos e engenheiros com os escritórios de </tspan><tspan x="-424.75" y="117.75" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">projetos e as empresas construtoras, responsáveis </tspan><tspan x="-405.9" y="138.3" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">pela produção dos imóveis que comercializa.</tspan></text></g></g></svg>