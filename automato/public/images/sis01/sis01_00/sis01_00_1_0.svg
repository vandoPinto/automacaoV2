"15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">O curso Sistema de Instalações Sanitárias foi </tspan><tspan x="-417.35" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">desenvolvido com a finalidade de capacitar o </tspan><tspan x="-436.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">profissional corretor de imóveis à compreensão de </tspan><tspan x="-424.15" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">aspectos fundamentais das diversas etapas que </tspan><tspan x="-418" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">envolvem um projeto de instalação sanitária.</tspan></text></g></g></svg>