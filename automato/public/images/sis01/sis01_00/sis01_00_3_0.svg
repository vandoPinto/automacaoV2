1_00_3_0a"/><g transform="matrix(1 0 0 1 468.35 39.2)"><clipPath id="sis01_00_3_0b"><path fill="#FFF" d="M-441.1-2h344.7v104.75h-344.7z"/></clipPath><text clip-path="url(#sis01_00_3_0b)" writing-mode="lr"><tspan x="-423.05" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">O curso Sistema de Instalações Sanitárias é </tspan><tspan x="-428.65" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">destinado aos profissionais que já trabalham </tspan><tspan x="-436.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">nessa área, bem como profissionais da área de </tspan><tspan x="-420.25" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">manutenção, segurança e áreas afins, que </tspan><tspan x="-437.8" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">estejam interessados em ingressar neste ramo.</tspan></text></g></g></svg>