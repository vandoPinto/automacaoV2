<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="453" height="105" viewBox="0 0 453 105"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_28_0a"><path fill="#FFF" d="M-441.1-2H11.75v104.75H-441.1z"/></clipPath><text clip-path="url(#sis01_02_28_0a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">No Código de Obras e Edificações do Distrito Federal, os </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">principais parâmetros de dimensionamento das principais </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">peças sanitárias a serem exigidas para as “edificações de uso </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">comercial de bens e serviços” são divididos em uma tabela </tspan><tspan x="-439.1" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">para os trabalhadores e outra para o público em geral.</tspan></text></g></svg>