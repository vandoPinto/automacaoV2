<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="440" height="105" viewBox="0 0 440 105"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_23_2a"><path fill="#FFF" d="M-441.1-2H-2v104.75h-439.1z"/></clipPath><text clip-path="url(#sis01_02_23_2a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">De um modo geral, onde as águas limpas (frias ou quentes) </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">chegam, temos um </tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16" fill="#F00">ponto de uso</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16"> que deve encaminhar as </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">águas servidas: as instalações das “águas limpas” e as </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">instalações das “águas servidas” se complementam, uma é </tspan><tspan x="-439.1" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">a “sombra” da outra.</tspan></text></g></svg>