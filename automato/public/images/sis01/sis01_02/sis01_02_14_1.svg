<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="440" height="126" viewBox="0 0 440 126"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_14_1a"><path fill="#FFF" d="M-441.1-2H-2v125.3h-439.1z"/></clipPath><text clip-path="url(#sis01_02_14_1a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">As caixas sifonadas são úteis invenções, que permitem a </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">proteção de quatro ou mais ramais de esgotos secundários </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">contra a exalação de gases vindos dos esgotos. Dizemos que </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">é sifonada por possuir um fecho hídrico. Com dispositivo </tspan><tspan x="-439.1" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">assemelhado também temos os ralos sifonados, que podem </tspan><tspan x="-439.1" y="117.75" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">servir diretamente às águas e lavagem do chão.</tspan></text></g></svg>