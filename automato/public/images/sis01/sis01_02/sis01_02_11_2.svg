<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="429" height="85" viewBox="0 0 429 85"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_11_2a"><path fill="#FFF" d="M-441.1-2H-13v84.2h-428.1z"/></clipPath><text clip-path="url(#sis01_02_11_2a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Os esgotos primários estão diretamente ligados aos vasos </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">sanitários, que possuem sifões destinados a evitar que os </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">gases dos esgotos forcem passagem para o interior dos </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">banheiros e das edificações.</tspan></text></g></svg>