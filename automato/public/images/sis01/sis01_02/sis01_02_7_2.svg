 0 1 506.5 32.9)"><clipPath id="sis01_02_7_2b"><path fill="#FFF" d="M-441.1-2h350v125.3h-350z"/></clipPath><text clip-path="url(#sis01_02_7_2b)" writing-mode="lr"><tspan x="-412.85" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Ao contrário das demais </tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16" fill="#F00">instalações</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">, que </tspan><tspan x="-410.15" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">recebem </tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Bold" font-weight="bold" font-size="16">insumos</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16"> (água, energia, dados </tspan><tspan x="-414.3" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">eletrônicos) do exterior da edificação, as </tspan><tspan x="-410.45" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">instalações sanitárias conduzem dejetos </tspan><tspan x="-412.2" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">produzidos pelas atividades e pessoas no </tspan><tspan x="-346.4" y="117.75" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">interior da edificação.</tspan></text></g></g></svg>