<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="440" height="85" viewBox="0 0 440 85"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_22_2a"><path fill="#FFF" d="M-441.1-2H-2v84.2h-439.1z"/></clipPath><text clip-path="url(#sis01_02_22_2a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Devemos planejar com cuidado tanto a descida dos esgotos </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">quanto a descida dos tubos de abastecimento de água fria e </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">de água quente, usando o recurso de </tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16" fill="#F00">paredes molhadas</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16"> e de </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16" fill="#F00">poços de descida</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">.</tspan></text></g></svg>