<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="429" height="64" viewBox="0 0 429 64"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_10_2a"><path fill="#FFF" d="M-441.1-2H-13v63.65h-428.1z"/></clipPath><text clip-path="url(#sis01_02_10_2a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Para isso existem instâncias de impedimento desse </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">retorno, caixas sifonadas que permitem a saída das águas </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">negras, mas que impedem o retorno desses gases.</tspan></text></g></svg>