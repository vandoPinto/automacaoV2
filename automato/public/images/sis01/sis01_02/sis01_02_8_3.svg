-size="16" fill="#F00">águas</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">, esse é um importante ciclo </tspan><tspan x="-418.05" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">de funcionamento das edificações. Os dois </tspan><tspan x="-412.15" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">ciclos não se tocam fisicamente, embora </tspan><tspan x="-416.15" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">tenhamos algumas situações em que pode </tspan><tspan x="-417.35" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">ocorrer esse contato, que contribui para a </tspan><tspan x="-377.75" y="117.75" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">contaminação da água potável.</tspan></text></g></g></svg>