<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="921" height="44" viewBox="0 0 921 44"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_2_1a"><path fill="#FFF" d="M-441.1-2h920.35v43.1H-441.1z"/></clipPath><text clip-path="url(#sis01_02_2_1a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Rigorosamente, as águas servidas ou “cinzas”, que não portam substâncias ou </tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16" fill="#F00">agentes patogênicos</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16"> são consideradas como </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">parte do sistema de água fria - mas que, uma vez reutilizadas, devem ir aos esgotos.</tspan></text></g></svg>