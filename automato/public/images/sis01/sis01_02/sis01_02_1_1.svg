<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="923" height="44" viewBox="0 0 923 44"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_1_1a"><path fill="#FFF" d="M-441.1-2h922.35v43.1H-441.1z"/></clipPath><text clip-path="url(#sis01_02_1_1a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">As instalações hidrossanitárias ou instalações sanitárias, ou instalações de esgotos, ou de resíduos líquidos, etc. se destinam a </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">conduzir adequadamente as águas servidas que contém </tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16" fill="#F00">dejetos orgânicos</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16"> e que não podem ser reaproveitadas (águas negras).</tspan></text></g></svg>