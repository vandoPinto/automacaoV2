0v22.6z" id="sis01_02_4_0i"/><path fill="#FFF" d="M2.65-6.75H.8L-1.45-3.3-3.5-6.75h-1.85l2.8 4.9L-5.6 3.4h1.85L-1.5-.2.85 3.4h2L-.5-1.8l3.15-4.95z" id="sis01_02_4_0j"/><path id="sis01_02_4_0g" stroke="#090" stroke-linejoin="round" stroke-linecap="round" fill="none" d="M-20.8-7.95l9.3 22.3h8.75Q7-3.25 20.85-14.35q-14.95 5.05-27 18l-5.45-13-9.2 1.4z"/></defs><g transform="matrix(1 0 0 1 80.1 95.15)"><use filter="url(#sis01_02_4_0b)" xlink:href="#sis01_02_4_0c" id="botao_1"/><use filter="url(#sis01_02_4_0b)" xlink:href="#sis01_02_4_0d" transform="matrix(1 0 0 1 0 80.25)" id="botao_2"/></g><g transform="matrix(1 0 0 1 445.2 92.05)"><g id="cheInfo_1"><use xlink:href="#sis01_02_4_0e" transform="matrix(.96039 0 0 .99667 20 15)"/><g transform="matrix(.96039 0 0 .99667 20 15)"><use xlink:href="#sis01_02_4_0f"/><use xlink:href="#sis01_02_4_0g"/></g></g><g id="cheInfo_2"><use xlink:href="#sis01_02_4_0e" transform="matrix(.96039 0 0 .99667 34.95 88.6)"/><g transform="matrix(.96039 0 0 .99667 34.95 88.6)"><use xlink:href="#sis01_02_4_0f"/><use xlink:href="#sis01_02_4_0g"/></g></g></g><g><g id="janela_1" transform="matrix(1 0 0 1 39.45 4)"><use xlink:href="#sis01_02_4_0h" transform="matrix(1 0 0 1 -4 -4)"/><g id="btClose_1"><use xlink:href="#sis01_02_4_0i" transform="matrix(.99887 -.00014 .00014 .99887 412.3 12.75)"/><use xlink:href="#sis01_02_4_0j" transform="matrix(.99887 -.00014 .00014 .99887 412.3 12.75) matrix(1 0 0 1 16.5 13)"/></g><g transform="matrix(1 0 0 1 503.3 41.75)"><clipPath id="sis01_02_4_0k"><path fill="#FFF" d="M-441.1-2h343.65v63.65H-441.1z"/></clipPath><text clip-path="url(#sis01_02_4_0k)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Especialmente da hidrodinâmica que permite a </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">previsão do comportamento da movimentação </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">e disposição de fluidos.</tspan></text></g></g><g id="janela_2" transform="matrix(1 0 0 1 4 111.45)"><use xlink:href="#sis01_02_4_0l" transform="matrix(1 0 0 1 -4 -4)"/><g id="btClose_2"><use xlink:href="#sis01_02_4_0i" transform="matrix(.99887 -.00014 .00014 .99887 485.15 12.75)"/><use xlink:href="#sis01_02_4_0j" transform="matrix(.99887 -.00014 .00014 .99887 485.15 12.75) matrix(1 0 0 1 16.5 13)"/></g><g transform="matrix(1 0 0 1 503.95 42.6)"><clipPath id="sis01_02_4_0m"><path fill="#FFF" d="M-441.1-2h413.2v84.2h-413.2z"/></clipPath><text clip-path="url(#sis01_02_4_0m)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Associados ao modo como diferentes “soluções” que </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">adotamos para limpar nossos corpos, nossos utensílios, </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">ou para usar a água em processos de produção industrial </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">(como um insumo que será incorporado aos produtos).</tspan></text></g></g></g></svg>