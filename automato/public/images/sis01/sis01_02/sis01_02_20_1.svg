<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="432" height="126" viewBox="0 0 432 126"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_20_1a"><path fill="#FFF" d="M-441.1-2H-9.65v125.3H-441.1z"/></clipPath><text clip-path="url(#sis01_02_20_1a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Da mesma forma, reformas descoordenadas podem levar a </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">que as canalizações dos esgotos primários tenham </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">declividades muito pequenas, quando os pontos sanitários </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">forem distanciados das tubulações de queda. Por </tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Bold" font-weight="bold" font-size="16">pontos </tspan><tspan x="-439.1" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Bold" font-weight="bold" font-size="16">sanitários</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16"> definimos todos os aparelhos e ralos que </tspan><tspan x="-439.1" y="117.75" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">alimentam o sistema de instalações sanitárias.</tspan></text></g></svg>