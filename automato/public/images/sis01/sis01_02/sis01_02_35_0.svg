"-431.15" y="138.3" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">edificação, águas “cinzas”, que devem ir ao esgoto </tspan><tspan x="-431.2" y="158.85" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">caso não haja sistema de reuso dessas águas, assim </tspan><tspan x="-402.55" y="179.4" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">como depois do reuso, quando as águas são </tspan><tspan x="-328.65" y="199.95" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">novamente recolhidas.</tspan></text></g></g></svg>