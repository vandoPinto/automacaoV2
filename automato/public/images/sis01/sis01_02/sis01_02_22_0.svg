y="Trebuchet_MS_Regular" font-size="16">Paredes mais espessas, de mais </tspan><tspan x="0" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">de 15cm de espessura.</tspan></text></g></g><use xlink:href="#sis01_02_22_0f" transform="matrix(1.06468 0 0 1.06468 158.6 119.25)" id="btnHot_FL"/></g></svg>