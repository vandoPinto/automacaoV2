<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="440" height="85" viewBox="0 0 440 85"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_13_1a"><path fill="#FFF" d="M-441.1-2H-2v84.2h-439.1z"/></clipPath><text clip-path="url(#sis01_02_13_1a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">Os esgotos secundários recolhem águas servidas vindas de </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">pias, chuveiros, etc. e não entram em contato direto com a </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16" fill="#F00">descarga do vaso sanitário</tspan><tspan baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">, mas com caixa sifonada que </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">impede a contaminação do banheiro por gases dos esgotos.</tspan></text></g></svg>