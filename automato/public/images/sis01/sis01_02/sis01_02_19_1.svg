<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" width="425" height="105" viewBox="0 0 425 105"><g transform="matrix(1 0 0 1 441.1 2)"><clipPath id="sis01_02_19_1a"><path fill="#FFF" d="M-441.1-2h424.45v104.75H-441.1z"/></clipPath><text clip-path="url(#sis01_02_19_1a)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">As plantas arquitetônicas que mudam as localizações de </tspan><tspan x="-439.1" y="35.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">banheiros de andar a andar, assim como nas edificações </tspan><tspan x="-439.1" y="56.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">existentes, as reformas que mudam os banheiros de um </tspan><tspan x="-439.1" y="76.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">lado para outro, podem dificultar o bom funcionamento </tspan><tspan x="-439.1" y="97.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">do sistema, caso não sejam bem solucionadas.</tspan></text></g></svg>