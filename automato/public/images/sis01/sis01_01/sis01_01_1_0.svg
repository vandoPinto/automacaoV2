441.1-2h609.9v242.4h-609.9z"/></clipPath><text clip-path="url(#sis01_01_1_0c)" writing-mode="lr"><tspan x="-439.1" y="15" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">- identificar o problema geral dos resíduos líquidos nas edificações;</tspan><tspan x="-439.1" y="48.55" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">- conhecer resíduos líquidos: as águas servidas e as águas fecais;</tspan><tspan x="-439.1" y="82.1" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">- analisar diferentes lógicas para o condicionamento sanitário das edificações;</tspan><tspan x="-439.1" y="115.65" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">- apontar dimensionamentos do sistema sanitário da edificação;</tspan><tspan x="-439.1" y="149.2" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">- definir a anatomia do esgoto primário;</tspan><tspan x="-439.1" y="182.75" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">- distinguir sistema de instalações sanitárias e demais sistemas e componentes da </tspan><tspan x="-439.1" y="201.3" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">edificação;</tspan><tspan x="-439.1" y="234.85" baseline-shift="0%" font-family="Trebuchet_MS_Regular" font-size="16">- realizar lista de checagem de problemas das instalações sanitárias.</tspan></text></g><g transform="matrix(1.27878 0 0 1.27878 598.6 7)" filter="url(#sis01_01_1_0d)"><clipPath id="sis01_01_1_0e"><path fill="#FFF" d="M-458.45-2H-47.2v27.95h-411.25z"/></clipPath><text clip-path="url(#sis01_01_1_0e)" writing-mode="lr"><tspan x="-456.45" y="19.25" baseline-shift="0%" font-family="Folio_BdCn_BT_Bold" font-weight="bold" font-size="20" fill="#FFF" letter-spacing="1.5">Ao final desta lição, você deverá ser capaz de:</tspan></text></g></svg>