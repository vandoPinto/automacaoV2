<style>
    .container {
        width: 100%;
        height: 600px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
    }

    p {
        font-size: 18px;
        line-height: 1.5;
        color: #333;
        padding: 20px;
        background-color: #d6c0a0;
        border-radius: 16px;
        max-width: 800px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-family: Arial, sans-serif;
        font-size: 14px;
        background-color: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    /* Cabeçalho */
    table thead {
        background-color: #2c3e50;
        color: #fff;
    }

    table th {
        padding: 12px 16px;
        text-align: left;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    /* Corpo */
    table td {
        padding: 12px 16px;
        border-bottom: 1px solid #eee;
    }

    td p {
        background-color: #ffffff00;
        border-radius: auto;
        max-width: auto;
    }

    /* Zebra */
    table tbody tr:nth-child(even) {
        background-color: #f8f9fa;
    }

    /* Hover */
    table tbody tr:hover {
        background-color: #eaf2ff;
        transition: background 0.2s ease;
    }

    /* Última linha sem borda */
    table tbody tr:last-child td {
        border-bottom: none;
    }

    /* Responsivo */
    @media (max-width: 768px) {
        table {
            font-size: 12px;
        }

        table th,
        table td {
            padding: 10px;
        }
    }
</style>

<div class="{{class}} container">
    {{TEXTOS}}
</div>
