<script>
    $(() => {

        let botoes = $(document).find('[id^=botao]').map((index, botao) => {

                apagarJanelas();
                mudarBotao(index + 1)
                $(janelas[index + 1]).show();
            })
        })

        function mudarBotao(numero) {
            $(document).find('[id^=botao]').map((index, botao) => {
                console.log('áqui');
                $(document).find(`[id^=botao_${index + 1}]`).css("background-color", "#004c72");
                $(document).find(`[id^=texto_${index + 1}]`).css("color", "#fac900");
            })
            $(document).find(`[id^=botao_${numero}]`).css("background-color", "#fac900");
            $(document).find(`[id^=texto_${numero}]`).css("color", "#004c72");
        }

        function apagarJanelas() {
            janelas.map((index, janela) => {
                $(janela).hide();
            })
        }
    })
</script>
